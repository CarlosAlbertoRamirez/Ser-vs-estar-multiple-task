<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ser vs. Estar A2–B1 | Your Mexican Friend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#25d9ff;--cyan2:#00bfff;--magenta:#ff2bbf;--magenta2:#ff4fd8;
  --bg1:#070019;--bg2:#160033;--text:#f0f0ff;--muted:#a8abce;--muted2:#5a5d8a;
  --good:#22c55e;--bad:#ef4444;--warn:#f59e0b;
  --ser:#f472b6;--ser2:#ff91cd;    /* pink  = SER  */
  --est:#25d9ff;--est2:#7ee8ff;    /* cyan  = ESTAR */
  --font:'DM Sans',system-ui,sans-serif;
  --display:'Syne',system-ui,sans-serif;
  --shadow:0 20px 40px rgba(0,0,0,.4),0 0 28px rgba(255,43,191,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:radial-gradient(ellipse at 10% 10%,rgba(255,43,191,.13),transparent 28%),radial-gradient(ellipse at 90% 15%,rgba(37,217,255,.09),transparent 28%),linear-gradient(155deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh}
.app{width:min(980px,96%);margin:14px auto 40px;display:flex;flex-direction:column;gap:12px}

/* HERO */
.hero{border-radius:22px;padding:22px 26px;background:linear-gradient(130deg,#0a0022,#1c0050 55%,#0c002e);border:1px solid rgba(255,255,255,.09);box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:38px 38px;pointer-events:none}
.hero-in{position:relative;z-index:1;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo-box{width:64px;height:64px;flex-shrink:0;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#0c0030,#280060);border:2px solid rgba(37,217,255,.28);box-shadow:0 0 18px rgba(255,43,191,.22);font-family:var(--display);font-size:.9rem;font-weight:900;color:var(--magenta);text-shadow:1px 1px 0 var(--cyan)}
.hero-text h1{font-family:var(--display);font-size:clamp(1.5rem,2.8vw,2.5rem);font-weight:900;line-height:.95;background:linear-gradient(90deg,var(--ser) 0%,#fff 40%,var(--est) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text p{color:var(--muted);font-size:.86rem;line-height:1.5;margin-top:4px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:999px;padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--muted)}
.badge.s{border-color:rgba(244,114,182,.35);color:var(--ser2)}
.badge.e{border-color:rgba(37,217,255,.35);color:var(--est2)}

/* SER/ESTAR COLOR PILLS */
.pill-ser{background:rgba(244,114,182,.15);border:1px solid rgba(244,114,182,.35);border-radius:999px;padding:2px 10px;font-size:.72rem;font-weight:800;color:var(--ser2)}
.pill-est{background:rgba(37,217,255,.12);border:1px solid rgba(37,217,255,.3);border-radius:999px;padding:2px 10px;font-size:.72rem;font-weight:800;color:var(--est2)}

/* EXERCISE TABS */
.ex-tabs{display:flex;gap:6px;background:linear-gradient(180deg,rgba(18,4,42,.97),rgba(24,10,52,.97));border:1px solid rgba(37,217,255,.13);border-radius:18px;padding:8px;box-shadow:var(--shadow);overflow-x:auto;scrollbar-width:none}
.ex-tabs::-webkit-scrollbar{display:none}
.etab{flex-shrink:0;border:0;border-radius:11px;padding:9px 12px;font-weight:800;font-family:var(--font);font-size:.78rem;cursor:pointer;transition:.16s;color:var(--muted2);background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.etab:hover{background:rgba(255,255,255,.07);color:var(--text)}
.etab.active{background:linear-gradient(135deg,var(--magenta),var(--magenta2));color:white;box-shadow:0 3px 0 rgba(0,0,0,.2);transform:translateY(-1px)}
.etab-icon{font-size:1.2rem;line-height:1}
.etab-label{font-size:.66rem;text-align:center;line-height:1.2;opacity:.9}

/* PANEL */
.panel{background:linear-gradient(180deg,rgba(18,4,42,.97),rgba(24,10,52,.97));border:1px solid rgba(37,217,255,.13);border-radius:20px;padding:24px 28px;box-shadow:var(--shadow)}
.hidden{display:none!important}

/* EXERCISE HEADER */
.ex-header{margin-bottom:16px}
.ex-title{font-family:var(--display);font-size:1.2rem;font-weight:900;margin-bottom:4px}
.ex-instr{font-size:.86rem;color:var(--muted);line-height:1.6;padding:9px 14px;background:rgba(37,217,255,.07);border-left:3px solid var(--cyan);border-radius:0 10px 10px 0}
.ex-instr em{color:var(--cyan);font-style:normal;font-weight:700}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sc{background:rgba(255,255,255,.05);border:1px solid rgba(37,217,255,.12);border-radius:11px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:1px}
.sc .l{font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2)}
.sc .v{font-family:var(--display);font-size:1.1rem;font-weight:800;color:var(--cyan)}
.sc .v.g{color:var(--good)}.sc .v.b{color:var(--bad)}
.prog-w{flex:1;min-width:100px}
.prog-l{font-size:.65rem;color:var(--muted2);font-weight:700;margin-bottom:3px}
.prog-t{height:5px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.prog-f{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--ser),var(--est));transition:width .35s}

/* ACTIONS */
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.btn{border:0;border-radius:11px;padding:9px 18px;font-weight:800;font-family:var(--font);font-size:.83rem;cursor:pointer;transition:.15s;box-shadow:0 3px 0 rgba(0,0,0,.2)}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0);box-shadow:none}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#07111f}
.btn-ser{background:linear-gradient(135deg,var(--ser),var(--ser2));color:#07111f}
.btn-est{background:linear-gradient(135deg,var(--est),var(--est2));color:#07111f}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(37,217,255,.18)}
.btn-dark{background:#0b0220;color:var(--muted);border:1px solid rgba(255,255,255,.08)}

/* FEEDBACK */
.fb{display:none;margin-top:12px;padding:11px 16px;border-radius:11px;font-size:.88rem;font-weight:500;line-height:1.6}
.fb.show{display:block}
.fb.ok{background:rgba(34,197,94,.12);border-left:4px solid var(--good);color:#bbf7d0;border-radius:0 11px 11px 0}
.fb.err{background:rgba(239,68,68,.11);border-left:4px solid var(--bad);color:#fecaca;border-radius:0 11px 11px 0}
.fb.partial{background:rgba(245,158,11,.1);border-left:4px solid var(--warn);color:#fde68a;border-radius:0 11px 11px 0}
.fb.info{background:rgba(37,217,255,.08);border-left:3px solid var(--cyan);color:var(--muted);border-radius:0 11px 11px 0}

/* ── EX 1: MULTIPLE CHOICE ── */
.mc-list{display:flex;flex-direction:column;gap:12px}
.mc-card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 18px;transition:border-color .15s}
.mc-card:hover{border-color:rgba(37,217,255,.18)}
.mc-num{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:6px}
.mc-sent{font-size:1.02rem;line-height:1.6;color:var(--text);margin-bottom:12px;font-weight:500}
.mc-blank{display:inline-block;min-width:52px;border-bottom:2.5px solid rgba(37,217,255,.45);padding:0 4px;text-align:center;font-weight:800;color:var(--cyan)}
.mc-opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.mc-opt{border:0;border-radius:10px;padding:9px 18px;font-weight:800;font-family:var(--font);font-size:.95rem;cursor:pointer;transition:.14s;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:var(--text);display:flex;align-items:center;gap:8px;min-width:90px}
.mc-opt:hover:not(:disabled){border-color:rgba(37,217,255,.4);background:rgba(37,217,255,.09);transform:translateY(-1px)}
.mc-opt:disabled{cursor:default;transform:none}
.mc-letter{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;flex-shrink:0;transition:.14s}
.mc-opt.mc-selected-ok{border-color:var(--good);background:rgba(34,197,94,.12);color:#86efac}
.mc-opt.mc-selected-ok .mc-letter{background:var(--good);color:#07111f}
.mc-opt.mc-selected-err{border-color:var(--bad);background:rgba(239,68,68,.1);color:#fca5a5}
.mc-opt.mc-selected-err .mc-letter{background:var(--bad);color:white}
.mc-opt.mc-correct{border-color:var(--good);background:rgba(34,197,94,.12);color:#86efac}
.mc-opt.mc-correct .mc-letter{background:var(--good);color:#07111f}
.mc-opt.mc-wrong{border-color:var(--bad);background:rgba(239,68,68,.1);color:#fca5a5}
.mc-opt.mc-wrong .mc-letter{background:var(--bad);color:white}

/* ── EX 2: MEANING SHIFT ── */
.ms-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ms-card{border-radius:16px;padding:18px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;flex-direction:column;gap:10px}
.ms-card.ser-card{border-color:rgba(244,114,182,.25);background:rgba(244,114,182,.04)}
.ms-card.est-card{border-color:rgba(37,217,255,.22);background:rgba(37,217,255,.04)}
.ms-word{font-family:var(--display);font-size:1.8rem;font-weight:900;text-align:center}
.ms-ser{color:var(--ser2)}.ms-est{color:var(--est2)}
.ms-sentence{font-size:.95rem;color:var(--text);line-height:1.5}
.ms-eng{font-size:.78rem;color:var(--muted2);margin-top:3px;font-style:italic}
.ms-q{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;margin-top:4px}
.ms-q-text{font-size:.92rem;margin-bottom:8px;line-height:1.5}
.ms-opts{display:flex;gap:6px;flex-wrap:wrap}
.ms-opt{border:0;border-radius:8px;padding:6px 14px;font-weight:700;font-family:var(--font);font-size:.82rem;cursor:pointer;transition:.14s;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text)}
.ms-opt:hover:not(:disabled){background:rgba(255,255,255,.12)}
.ms-opt:disabled{cursor:default}
.ms-opt.ok{background:rgba(34,197,94,.18);border-color:var(--good);color:#86efac}
.ms-opt.bad{background:rgba(239,68,68,.14);border-color:var(--bad);color:#fca5a5}

/* ── EX 3: ERROR HUNT ── */
.eh-list{display:flex;flex-direction:column;gap:10px}
.eh-item{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.eh-item:hover:not(.revealed){border-color:rgba(37,217,255,.3);background:rgba(37,217,255,.04)}
.eh-item.revealed{cursor:default}
.eh-item.correct-choice{border-color:var(--good);background:rgba(34,197,94,.07)}
.eh-item.wrong-choice{border-color:var(--bad);background:rgba(239,68,68,.07)}
.eh-num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;color:var(--muted2);flex-shrink:0}
.eh-sent{flex:1;font-size:.95rem;line-height:1.5}
.eh-sent .wrong-word{color:var(--bad);text-decoration:underline wavy var(--bad);font-weight:700}
.eh-sent .correct-word{color:var(--good);font-weight:700}
.eh-badge{font-size:.72rem;font-weight:800;border-radius:999px;padding:2px 9px;flex-shrink:0}
.eh-badge.correct{background:rgba(34,197,94,.15);color:var(--good);border:1px solid rgba(34,197,94,.3)}
.eh-badge.wrong{background:rgba(239,68,68,.12);color:var(--bad);border:1px solid rgba(239,68,68,.25)}
.eh-exp{display:none;font-size:.8rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);line-height:1.5}
.eh-item.revealed .eh-exp{display:block}
.eh-controls{display:flex;gap:8px;margin-bottom:14px;align-items:center;font-size:.8rem;color:var(--muted2);font-weight:700}
.eh-filter{border:0;border-radius:999px;padding:5px 13px;font-weight:700;font-family:var(--font);font-size:.75rem;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted2);transition:.14s}
.eh-filter.on{background:rgba(37,217,255,.14);color:var(--cyan);border-color:rgba(37,217,255,.3)}
.eh-filter.on-ser{background:rgba(244,114,182,.14);color:var(--ser2);border-color:rgba(244,114,182,.3)}

/* ── EX 4: SORT ── */
.sort-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.sort-bucket{border-radius:16px;padding:14px;min-height:200px;display:flex;flex-direction:column;gap:8px;transition:background .2s}
.sort-bucket.ser-bucket{background:rgba(244,114,182,.06);border:2px dashed rgba(244,114,182,.3)}
.sort-bucket.est-bucket{background:rgba(37,217,255,.06);border:2px dashed rgba(37,217,255,.25)}
.sort-bucket.drag-over{border-style:solid;box-shadow:0 0 0 3px rgba(255,255,255,.15)}
.sort-bucket-title{font-family:var(--display);font-size:1rem;font-weight:900;text-align:center;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.sort-bucket-sub{font-size:.68rem;color:var(--muted2);text-align:center;margin-bottom:6px}
.sort-pile{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;min-height:50px}
.sort-card{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:7px 13px;font-size:.85rem;font-weight:700;cursor:grab;user-select:none;transition:.15s;display:flex;align-items:center;gap:6px}
.sort-card:hover{border-color:rgba(37,217,255,.4);background:rgba(37,217,255,.1);transform:translateY(-2px)}
.sort-card:active{cursor:grabbing;transform:scale(.97)}
.sort-card.placed-ser{background:rgba(244,114,182,.14);border-color:rgba(244,114,182,.4);color:var(--ser2)}
.sort-card.placed-est{background:rgba(37,217,255,.12);border-color:rgba(37,217,255,.35);color:var(--est2)}
.sort-card.correct{background:rgba(34,197,94,.15);border-color:var(--good);color:#86efac;cursor:default}
.sort-card.wrong{background:rgba(239,68,68,.12);border-color:var(--bad);color:#fca5a5}
.sort-card.drag-ghost{opacity:.4}
.sort-pile-label{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);width:100%;margin-bottom:2px}

/* ── EX 5: SPEED ROUND ── */
.speed-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.speed-card{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 24px;text-align:center;width:100%;max-width:480px}
.speed-sentence{font-size:1.15rem;line-height:1.7;color:var(--text);margin-bottom:6px}
.speed-sentence em{font-style:normal;font-weight:900;color:var(--warn);background:rgba(245,158,11,.12);border-radius:5px;padding:0 5px}
.speed-hint{font-size:.78rem;color:var(--muted2);font-style:italic}
.speed-btns{display:flex;gap:14px;justify-content:center}
.speed-btn{border:0;border-radius:14px;padding:14px 32px;font-weight:900;font-family:var(--display);font-size:1.1rem;cursor:pointer;transition:.16s;box-shadow:0 4px 0 rgba(0,0,0,.25);min-width:130px}
.speed-btn.ser-btn{background:linear-gradient(135deg,var(--ser),var(--ser2));color:#07111f}
.speed-btn.est-btn{background:linear-gradient(135deg,var(--est),var(--est2));color:#07111f}
.speed-btn:hover{transform:translateY(-3px)}
.speed-btn:active{transform:translateY(0);box-shadow:none}
.speed-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.speed-fb{min-height:44px;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:600;border-radius:10px;padding:0 16px;width:100%;max-width:480px}
.speed-fb.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#86efac}
.speed-fb.err{background:rgba(239,68,68,.11);border:1px solid rgba(239,68,68,.22);color:#fca5a5}
.timer-row{display:flex;align-items:center;gap:10px;width:100%;max-width:480px}
.timer-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.timer-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--ser),var(--est));transition:width .9s linear}
.timer-num{font-family:var(--display);font-size:.85rem;font-weight:900;color:var(--muted2);min-width:20px;text-align:right}
.speed-stats{display:flex;gap:10px}
.spstat{background:rgba(255,255,255,.05);border:1px solid rgba(37,217,255,.12);border-radius:11px;padding:7px 14px;text-align:center}
.spstat .sl{font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2)}
.spstat .sv{font-family:var(--display);font-size:1.2rem;font-weight:900;color:var(--cyan)}
.spstat .sv.g{color:var(--good)}.spstat .sv.b{color:var(--bad)}.spstat .sv.w{color:var(--warn)}
.speed-start{text-align:center;padding:20px 0;display:flex;flex-direction:column;align-items:center;gap:14px}
.speed-start h2{font-family:var(--display);font-size:1.5rem;font-weight:900}
.speed-start p{color:var(--muted);font-size:.88rem;max-width:360px;line-height:1.6}
.streak-badge{background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.3);border-radius:999px;padding:4px 12px;font-size:.75rem;font-weight:800;color:#fcd34d;display:none}
.streak-badge.show{display:inline-flex;align-items:center;gap:4px}
.combo-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--display);font-size:2rem;font-weight:900;color:var(--warn);pointer-events:none;opacity:0;z-index:999;text-shadow:0 0 20px rgba(245,158,11,.5)}
.combo-flash.anim{animation:cf .7s ease forwards}
@keyframes cf{0%{opacity:1;transform:translate(-50%,-60%) scale(.8)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-40%) scale(1)}}

/* ── EX 6: REFERENCE CARD ── */
.ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ref-col{border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px}
.ref-col.ser-col{background:rgba(244,114,182,.06);border:1.5px solid rgba(244,114,182,.2)}
.ref-col.est-col{background:rgba(37,217,255,.05);border:1.5px solid rgba(37,217,255,.18)}
.ref-col-title{font-family:var(--display);font-size:1.1rem;font-weight:900;display:flex;align-items:center;gap:8px}
.ref-acro{font-size:.7rem;font-weight:800;background:rgba(255,255,255,.08);border-radius:6px;padding:3px 8px;letter-spacing:.06em;color:var(--muted)}
.ref-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06)}
.ref-key{font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;min-width:90px;flex-shrink:0;margin-top:2px}
.ref-val{font-size:.83rem;color:var(--muted);line-height:1.5}
.ref-val em{color:var(--text);font-style:normal}
.special-cases{margin-top:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px}
.special-cases h3{font-family:var(--display);font-size:.95rem;font-weight:800;margin-bottom:12px;color:var(--warn)}
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.sp-card{background:rgba(255,255,255,.04);border-radius:10px;padding:11px 13px;border:1px solid rgba(255,255,255,.08)}
.sp-word{font-family:var(--display);font-size:.95rem;font-weight:900;margin-bottom:6px;color:var(--warn)}
.sp-row{font-size:.8rem;line-height:1.5}
.sp-row .s{color:var(--ser2);font-weight:700}

function renderFill(){

  let qHTML='';

        <span class="mc-letter">${letters[oi]}</span>
        <span class="mc-text">${opt}</span>
      </button>`).join('');

    qHTML+=`
    <div class="mc-card" id="mcard_${i}">
      <div class="mc-num">${i+1}</div>
      <div class="mc-sent">${item.sent.replace('___','<span class="mc-blank">___</span>')}</div>
      <div class="mc-opts" id="mcopts_${i}">${optsHTML}</div>
      <div class="fb" id="mcfb_${i}"></div>
    </div>`;

  </div>

  <div class="fb" id="f1fb"></div>
  <div class="actions" style="margin-top:16px">

function resetFill(){

}

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function answerFill(qIdx, chosen){
  if(fill_checked) return;
  if(fill_answers[qIdx]!==undefined){
    // allow changing answer — deselect previous
    const prev=fill_answers[qIdx];
    const prevBtn=document.getElementById(`mc_${qIdx}_${prev}`);
    if(prevBtn){ prevBtn.classList.remove('mc-selected-ok','mc-selected-err'); }
  }
  fill_answers[qIdx]=chosen;
  const item=FILL_BLANKS[qIdx];
  const isOk=chosen===item.ans;
  const btn=document.getElementById(`mc_${qIdx}_${chosen}`);
  if(btn) btn.classList.add(isOk?'mc-selected-ok':'mc-selected-err');
  // update progress
  const pct=Math.round(Object.keys(fill_answers).length/FILL_BLANKS.length*100);
  const el=document.getElementById('f1pct'); if(el)el.textContent=pct+'%';
  const pg=document.getElementById('f1prog'); if(pg)pg.style.width=pct+'%';
}

function checkFill(){
  if(Object.keys(fill_answers).length===0) return;
  fill_checked=true;
  let ok=0;

  FILL_BLANKS.forEach((item,i)=>{
    const chosen=fill_answers[i];
    const answered=chosen!==undefined;
    const isOk=answered&&chosen===item.ans;
    if(isOk) ok++;

    // style all 4 buttons
    item.opts.forEach((_,oi)=>{
      const btn=document.getElementById(`mc_${i}_${oi}`);
      if(!btn)return;
      btn.disabled=true;
      btn.classList.remove('mc-selected-ok','mc-selected-err');
      if(oi===item.ans){ btn.classList.add('mc-correct'); }
      else if(oi===chosen&&!isOk){ btn.classList.add('mc-wrong'); }
    });

    // feedback
    const fb=document.getElementById(`mcfb_${i}`);
    if(fb){
      fb.className='fb show '+(isOk?'ok':'err');
      if(!answered) fb.innerHTML=`⚠ Sin respuesta. La correcta: <strong>${item.opts[item.ans]}</strong>. ${item.exp}`;
      else if(isOk) fb.innerHTML=`✓ <strong>¡Correcto!</strong> ${item.exp}`;
      else fb.innerHTML=`✗ La respuesta correcta es <strong>${item.opts[item.ans]}</strong>. ${item.exp}`;
    }
  });

  const total=FILL_BLANKS.length, pct=Math.round(ok/total*100);
  const okEl=document.getElementById('f1ok'); if(okEl)okEl.textContent=ok;
  const errEl=document.getElementById('f1err'); if(errEl)errEl.textContent=total-ok;
  const pgEl=document.getElementById('f1prog'); if(pgEl)pgEl.style.width='100%';
  const pctEl=document.getElementById('f1pct'); if(pctEl)pctEl.textContent='100%';
  const fb=document.getElementById('f1fb');
  if(pct===100){ fb.className='fb show ok'; fb.innerHTML='🏆 <strong>¡Perfecto! 20/20.</strong> Dominas ser y estar en contexto.';}
  else if(pct>=75){ fb.className='fb show ok'; fb.innerHTML=`👍 <strong>${ok}/${total}.</strong> Muy bien. Lee las explicaciones de los errores.`;}
  else if(pct>=50){ fb.className='fb show partial'; fb.innerHTML=`📖 <strong>${ok}/${total}.</strong> Recuerda: ubicación de objetos/personas → ESTAR; ubicación de eventos → SER.`;}
  else { fb.className='fb show err'; fb.innerHTML=`💪 <strong>${ok}/${total}.</strong> Repasa: SER = D.O.C.T.O.R. · ESTAR = P.L.A.C.E. y consulta la Reference card.`;}
  document.getElementById('f1check').disabled=true;
}

function resetFill(){
  fill_checked=false; fill_answers={}; fill_openTip=null;
  renderFill();
}

function renderErrorHunt(){
  eh_answered={};
  let html=`<div class="panel">
  <div class="ex-header">
    <div class="ex-title">🔍 Error hunter</div>
    <div class="ex-instr">Some sentences have the <em>wrong verb</em>. Click each sentence to reveal if it's correct or not — and why.</div>
  </div>
  <div class="eh-controls">
    <span>Filter:</span>
    <button class="eh-filter on" id="ehf-all" onclick="setEhFilter('all')">All</button>
    <button class="eh-filter" id="ehf-error" onclick="setEhFilter('error')">❌ Errors only</button>
    <button class="eh-filter" id="ehf-correct" onclick="setEhFilter('correct')">✅ Correct only</button>
  </div>
  <div class="eh-list" id="ehList">`;

  ERROR_ITEMS.forEach((item,idx)=>{
    const [sent,hasError,correction,exp]=item;
    html+=`<div class="eh-item" id="ehi_${idx}" data-error="${hasError}" onclick="revealEh(${idx})">
      <div class="eh-num">${idx+1}</div>
      <div style="flex:1">
        <div class="eh-sent">${sent}</div>
        <div class="eh-exp">${exp}</div>
      </div>
      <div class="eh-badge" id="ehbadge_${idx}" style="display:none"></div>
    </div>`;
  });

  html+=`</div>
  <div class="fb" id="ehFb" style="margin-top:14px"></div>

    <button class="btn btn-ghost" onclick="resetEh()">↺ Reset</button>
  </div></div>`;

  document.getElementById('exContainer').innerHTML=html;
}

function revealEh(idx){
  if(eh_answered[idx]) return;
  eh_answered[idx]=true;
  const [sent,hasError,correction,exp]=ERROR_ITEMS[idx];
  const item=document.getElementById('ehi_'+idx);
  const badge=document.getElementById('ehbadge_'+idx);
  if(!item||!badge) return;
  item.classList.add('revealed');
  item.classList.add(hasError?'wrong-choice':'correct-choice');
  badge.style.display='inline-block';
  badge.className='eh-badge '+(hasError?'wrong':'correct');
  badge.textContent=hasError?'❌ Error':'✅ Correct';
  if(hasError){
    const sentEl=item.querySelector('.eh-sent');
    const verbMap={'es':'es','está':'está','son':'son','están':'están'};
    // highlight the wrong verb in the sentence
    const wrongVerbs=['es ','está ','son ','están ','ser ','estar ','estoy ','somos '];
    let highlighted=sent;
    if(correction){
      // find and mark wrong verb forms
      const allForms=['es','está','son','están','estoy','somos','estamos'];
      allForms.forEach(f=>{
        if(f!==correction){
          const re=new RegExp(`\\b${f}\\b`,'g');
          highlighted=highlighted.replace(re,`<span class="wrong-word">${f}</span>`);
        }
      });
    }
    sentEl.innerHTML=highlighted;
  }
  // update fb counter
  const done=Object.keys(eh_answered).length;
  const total=ERROR_ITEMS.length;
  if(done===total){
    const fb=document.getElementById('ehFb');
    fb.className='fb show ok';
    fb.innerHTML=`✓ <strong>¡Revelaste todo!</strong> Había ${ERROR_ITEMS.filter(e=>e[1]).length} errores de ${total} oraciones.`;
  }
}

function revealAllEh(){
  ERROR_ITEMS.forEach((_,idx)=>revealEh(idx));
}
function resetEh(){
  eh_answered={};
  renderErrorHunt();
}

let ehFilter='all';
function setEhFilter(f){
  ehFilter=f;
  ['all','error','correct'].forEach(k=>{
    const btn=document.getElementById('ehf-'+k);
    if(btn) btn.className='eh-filter'+(k===f?' on':'');
  });
  const items=document.querySelectorAll('.eh-item');
  items.forEach(item=>{
    const isError=item.dataset.error==='true';
    if(f==='all') item.style.display='';
    else if(f==='error') item.style.display=isError?'':'none';
    else if(f==='correct') item.style.display=isError?'none':'';
  });
}

/* ══════════════════════════════════════════
   EX 4: DRAG & SORT (use-case buckets)
══════════════════════════════════════════ */
function renderSort(){
  sortPlaced={}; sortChecked=false;
  const shuffled=[...SORT_ITEMS].sort(()=>Math.random()-.5);
  const pileHTML=shuffled.map(item=>`
    <div class="sort-card" id="sc_${item.id}" draggable="true"
      ondragstart="dragStart(event,'${item.id}')"
      ondragend="dragEnd(event)"
      onclick="tapSort('${item.id}')">
      ${item.text}
    </div>`).join('');

  const bucketsHTML=SORT_BUCKETS.map(b=>`
    <div class="sort-bucket" id="bucket-${b.id}" style="border-color:${b.color}44;background:${b.color}08"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropInto(event,'${b.id}')"
      onclick="bucketTap('${b.id}')">
      <div class="sort-bucket-title" style="color:${b.color}">${b.icon} ${b.label}</div>
      <div class="sort-bucket-sub">${b.sub}</div>
    </div>`).join('');

  const html=`<div class="panel">
  <div class="ex-header">
    <div class="ex-title">🗂️ Drag & sort</div>
    <div class="ex-instr">Drag each sentence to the <em>grammar rule</em> it demonstrates. The verb is hidden — read the sentence and decide what rule applies. Some are tricky!</div>
  </div>
  <div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:8px">Cards — drag or tap a card, then tap a bucket</div>
  <div class="sort-pile" id="sortPile">${pileHTML}</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;margin-bottom:14px">${bucketsHTML}</div>
  <div class="fb" id="sortFb"></div>
  <div class="actions">
    <button class="btn btn-cyan" id="sortCheck" onclick="checkSort()" disabled>Revisar</button>
    <button class="btn btn-ghost" onclick="resetSort()">↺ Reiniciar</button>
  </div></div>`;

  document.getElementById('exContainer').innerHTML=html;
}

let tapSelected=null;
function tapSort(id){
  if(sortPlaced[id]) return;
  const card=document.getElementById('sc_'+id);
  if(!card) return;
  if(tapSelected===id){
    // deselect
    card.style.boxShadow='';
    tapSelected=null;
    return;
  }
  // select
  if(tapSelected){
    const prev=document.getElementById('sc_'+tapSelected);
    if(prev) prev.style.boxShadow='';
  }
  tapSelected=id;
  card.style.boxShadow='0 0 0 3px var(--cyan)';
}

function dragStart(e,id){ dragItem=id; e.dataTransfer.setData('text',id); setTimeout(()=>{ const c=document.getElementById('sc_'+id); if(c) c.classList.add('drag-ghost'); },0); }
function dragEnd(e){ if(dragItem){ const c=document.getElementById('sc_'+dragItem); if(c) c.classList.remove('drag-ghost'); } dragItem=null; }

function dropInto(e, bucket){
  e.preventDefault();
  const id=e.dataTransfer.getData('text')||dragItem;
  const bEl=document.getElementById('bucket-'+bucket);
  if(bEl) bEl.classList.remove('drag-over');
  if(!id||sortPlaced[id]) return;
  placeCard(id, bucket);
}

// tap-to-place
function bucketTap(bucket){
  if(!tapSelected) return;
  placeCard(tapSelected, bucket);
  tapSelected=null;
}

function placeCard(id, bucket){
  sortPlaced[id]=bucket;
  const card=document.getElementById('sc_'+id);
  const bucketEl=document.getElementById('bucket-'+bucket);
  if(!card||!bucketEl) return;
  card.style.boxShadow='';
  card.classList.remove('drag-ghost');
  const bData=SORT_BUCKETS.find(b=>b.id===bucket);
  card.className='sort-card';
  card.style.borderColor=bData?bData.color+'66':'rgba(255,255,255,.25)';
  card.style.background=bData?bData.color+'10':'rgba(255,255,255,.06)';
  card.draggable=false;
  card.onclick=()=>{ returnCard(id); };
  bucketEl.appendChild(card);
  if(Object.keys(sortPlaced).length===SORT_ITEMS.length){
    const btn=document.getElementById('sortCheck'); if(btn) btn.disabled=false;
  }
}

function returnCard(id){
  if(sortChecked) return;
  delete sortPlaced[id];
  const card=document.getElementById('sc_'+id);
  const pile=document.getElementById('sortPile');
  if(!card||!pile) return;
  card.className='sort-card';
  card.draggable=true;
  card.onclick=()=>tapSort(id);
  card.ondragstart=(e)=>dragStart(e,id);
  card.ondragend=(e)=>dragEnd(e);
  pile.appendChild(card);
  const btn=document.getElementById('sortCheck'); if(btn) btn.disabled=true;
}

function checkSort(){
  sortChecked=true;
  let ok=0;
  SORT_ITEMS.forEach(item=>{
    const placed=sortPlaced[item.id];
    const card=document.getElementById('sc_'+item.id);
    if(!card) return;
    const isOk=placed===item.correct;
    if(isOk) ok++;
    card.className='sort-card '+(isOk?'correct':'wrong');
    card.draggable=false; card.onclick=null;
    if(!isOk){
      const correctBucket=SORT_BUCKETS.find(b=>b.id===item.correct);
      card.innerHTML=`${item.text}<br><span style="font-size:.68rem;opacity:.85">→ ${correctBucket?correctBucket.icon+' '+correctBucket.label:item.correct}</span>`;
    }
    card.title=`${item.verb} — ${item.exp}`;
  });
  const pct=Math.round(ok/SORT_ITEMS.length*100);
  const fb=document.getElementById('sortFb');
  fb.className='fb show '+(pct>=80?'ok':pct>=55?'partial':'err');
  fb.innerHTML=`<strong>${ok}/${SORT_ITEMS.length} (${pct}%).</strong> Las tarjetas rojas muestran el cubo correcto y el verbo. Pasa el cursor para ver la explicación.`;
  document.getElementById('sortCheck').disabled=true;
}
function resetSort(){ renderSort(); }

   EX 5: SPEED ROUND — type the correct form
══════════════════════════════════════════ */
function renderSpeed(){
  if(speedTimer){ clearInterval(speedTimer); speedTimer=null; }
  speedIdx=0; speedOk=0; speedErr=0; speedStreak=0; speedAnswered=false;

  const html=`<div class="panel">
  <div class="ex-header">
    <div class="ex-title">⚡ Speed round</div>
    <div class="ex-instr">Type the correct conjugated form of SER or ESTAR — <em>not just "ser" or "estar"</em>, but the right form: <em>es, está, somos, estoy…</em> You have <em>7 seconds</em>. Press Enter to confirm.</div>
  </div>
  <div id="speedInner">
    <div class="speed-start">
      <div style="font-size:3rem">⚡</div>
      <h2>Escribe la forma correcta</h2>
      <p>Type the exact conjugated form that completes the sentence. Accents are optional. 30 sentences total — build a streak!</p>
      <button class="btn btn-cyan" onclick="startSpeed()">¡Empezar!</button>
    </div>
  </div></div>`;

  document.getElementById('exContainer').innerHTML=html;
}

function startSpeed(){
  speedIdx=0; speedOk=0; speedErr=0; speedStreak=0;
  nextSpeedQ();
}

function normSpeed(s){
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z\s\/\-]/g,'').trim();
}

function nextSpeedQ(){
  if(speedIdx>=SPEED_ITEMS.length){ endSpeed(); return; }
  speedAnswered=false;
  const item=SPEED_ITEMS[speedIdx];
  speedTimeLeft=7;

  document.getElementById('speedInner').innerHTML=`
    <div class="speed-stats">
      <div class="spstat"><div class="sl">Pregunta</div><div class="sv w">${speedIdx+1}/30</div></div>
      <div class="spstat"><div class="sl">Correctas</div><div class="sv g">${speedOk}</div></div>
      <div class="spstat"><div class="sl">Errores</div><div class="sv b">${speedErr}</div></div>
    </div>
    <div class="streak-badge ${speedStreak>=3?'show':''}" id="streakBadge">🔥 Racha: ${speedStreak}</div>
    <div class="speed-card">
      <div class="speed-sentence">${item.q.replace(/_+/g,'<em>___</em>')}</div>
      <div class="speed-hint">💡 ${item.hint}</div>
    </div>
    <div class="timer-row">
      <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%;transition:width 1s linear"></div></div>
      <div class="timer-num" id="timerNum">7</div>
    </div>
    <div class="speed-input-row" style="display:flex;gap:8px;justify-content:center;margin-top:10px;width:100%;max-width:480px">
      <input id="speedInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="escribe aquí…"
        style="flex:1;background:rgba(255,255,255,.07);border:1.5px solid rgba(37,217,255,.3);border-radius:11px;padding:11px 15px;font-family:var(--font);font-size:1.05rem;font-weight:700;color:var(--text);outline:none;transition:.15s;max-width:280px"
        oninput="this.style.borderColor='rgba(37,217,255,.5)'"
        onkeydown="if(event.key==='Enter')submitSpeedAnswer()">
      <button class="btn btn-cyan" onclick="submitSpeedAnswer()" style="flex-shrink:0">→</button>
    </div>
    <div class="speed-fb" id="speedFb" style="opacity:0;margin-top:8px;width:100%;max-width:480px"></div>`;

  setTimeout(()=>{ const inp=document.getElementById('speedInput'); if(inp) inp.focus(); },60);

  if(speedTimer) clearInterval(speedTimer);
  speedTimer=setInterval(()=>{
    speedTimeLeft-=1;
    const fill=document.getElementById('timerFill');
    const num=document.getElementById('timerNum');
    if(fill) fill.style.width=Math.max(0,(speedTimeLeft/7)*100)+'%';
    if(num){ num.textContent=speedTimeLeft; num.style.color=speedTimeLeft<=2?'var(--bad)':speedTimeLeft<=4?'var(--warn)':'var(--muted2)'; }
    if(speedTimeLeft<=0){ clearInterval(speedTimer); speedTimer=null; if(!speedAnswered) answerSpeed(null); }
  },1000);
}

function submitSpeedAnswer(){
  const inp=document.getElementById('speedInput');
  if(!inp) return;
  answerSpeed(inp.value);
}

function answerSpeed(typed){
  if(speedAnswered) return;
  speedAnswered=true;
  if(speedTimer){ clearInterval(speedTimer); speedTimer=null; }
  const item=SPEED_ITEMS[speedIdx];
  const inp=document.getElementById('speedInput');
  if(inp) inp.disabled=true;

  const normTyped=normSpeed(typed||'');
  const normAns=normSpeed(item.ans);
  const isOk = normTyped===normAns || item.also.some(a=>normSpeed(a)===normTyped);

  if(isOk){ speedOk++; speedStreak++; }
  else { speedErr++; speedStreak=0; }

  const fb=document.getElementById('speedFb');
  if(fb){
    fb.style.opacity='1';
    if(!typed||typed.trim()===''){
      fb.className='speed-fb err';
      fb.innerHTML=`⏱ Time! The answer was <strong>${item.ans}</strong>.`;
    } else if(isOk){
      fb.className='speed-fb ok';
      fb.innerHTML=`✓ <strong>¡Correcto!</strong>${speedStreak>=3?' 🔥 Racha: '+speedStreak:''}`;
    } else {
      fb.className='speed-fb err';
      fb.innerHTML=`✗ Escribiste <strong>${typed.trim()}</strong> — la respuesta es <strong>${item.ans}</strong>.`;
    }
  }

  if(speedStreak>=3){
    const cf=document.getElementById('comboFlash');
    cf.textContent='🔥 x'+speedStreak;
    cf.classList.remove('anim'); void cf.offsetWidth; cf.classList.add('anim');
  }

  speedIdx++;
  setTimeout(nextSpeedQ, isOk?750:1400);
}

function endSpeed(){
  const pct=Math.round(speedOk/SPEED_ITEMS.length*100);
  const emo=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  const msg=pct>=90?'¡Excelente dominio! Ser y estar no te confunden.'
    :pct>=70?'¡Muy bien! Unos errores puntuales — revísalos.'
    :pct>=50?'Buen intento. Sigue practicando los casos especiales.'
    :'Repasa los acrónimos D.O.C.T.O.R. y P.L.A.C.E. e inténtalo de nuevo.';
  document.getElementById('speedInner').innerHTML=`
    <div class="speed-start">
      <div style="font-size:3rem">${emo}</div>
      <h2>${speedOk}/30 correctas</h2>
      <p style="color:var(--muted)">${msg}</p>
      <button class="btn btn-cyan" onclick="startSpeed()">↺ Intentar de nuevo</button>
    </div>`;
}
